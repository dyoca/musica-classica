<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Música Clássica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Música Clássica</h1>
      <p>
        Explore compositores e obras clássicas
      </p>
    </div>
    <!-- Seção de cadastro de novo usuário -->
    <div class="card" id="telaCadastro">
      <h2>Criar Conta</h2>
      <!-- Campo de entrada para o nome do novo usuário -->
      <input
        type="text"
        id="cadastroNome"
        placeholder="Seu nome"
      >
      <input
        type="email"
        id="cadastroEmail"
        placeholder="Seu email"
      >
      <input
        type="password"
        id="cadastroSenha"
        placeholder="Sua senha"
      >
      <button onclick="cadastrar()">
        Cadastrar
      </button>
      <p class="link" onclick="mostrarLogin()">
        Já tenho conta
      </p>
    </div>
    <div id="audioPlayer" class="hidden">
  <div id="audioTitulo"></div>
  <div id="audioInfo"></div>

  <audio id="player" controls></audio>
</div>
    <!-- Seção de login para usuários existentes -->
    <div
      class="card hidden"
      id="telaLogin"
    >
      <h2>Login</h2>
      <input
        type="email"
        id="loginEmail"
        placeholder="Seu email"
      >
      <input
        type="password"
        id="loginSenha"
        placeholder="Sua senha"
      >
      <button onclick="login()">
        Entrar
      </button>
      <!-- Link para alternar para tela de cadastro -->
      <p class="link" onclick="mostrarCadastro()">
        Criar conta
      </p>
    </div>
    <!-- Seção do painel principal exibida após login -->
    <div
      class="card hidden"
      id="painel"
    >
      <h2>Compositores</h2>
      <input
        type="text"
        id="nome"
        placeholder="Nome"
      >
      <input
        type="text"
        id="pais"
        placeholder="País"
      >
      <input
        type="text"
        id="periodo"
        placeholder="Período"
      >
      <button onclick="cadastrarCompositor()">
        Cadastrar compositor
      </button>
      <button onclick="listarCompositores()">
        Atualizar lista
      </button>
      <ul id="listaCompositores"></ul>

  <hr style="margin:20px 0;">

  <h2>Pesquisar Compositores e Obras</h2>

  <input
  id="buscaGlobal"
  oninput="iniciarBuscaLive()"
  placeholder="Digite nome do compositor ou obra..."
/>
  <ul id="listaSugestoes"></ul>


  <hr style="margin:20px 0;">

  <button
    onclick="window.location.href='obras.html'"
  >
    Ver todas as obras
  </button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
