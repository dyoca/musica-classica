<!DOCTYPE html>
<html>
<head>
  <title>Obras</title>
</head>
<body>

<button onclick="voltar()">⬅ Voltar</button>

<h2 id="titulo"></h2>
<ul id="lista"></ul>

<script>
const API = "http://localhost:3000";

const compositor = sessionStorage.getItem("compositor");

document.getElementById("titulo").innerText = compositor;

async function carregar() {
  const res = await fetch(`${API}/obras`);
  const data = await res.json();

  const lista = document.getElementById("lista");

  const filtradas = data.filter(o =>
    (o.compositorNome || "")
      .toLowerCase()
      .includes(compositor.toLowerCase())
  );

  filtradas.forEach(o => {
    const li = document.createElement("li");

    li.innerHTML = `
      <strong>${o.titulo}</strong>
    `;

    const btn = document.createElement("button");
    btn.textContent = "Ouvir";
    btn.onclick = () => {
      alert("Volte pra home pra ouvir (simplificação segura)");
    };

    li.appendChild(btn);
    lista.appendChild(li);
  });
}

function voltar() {
  window.location.href = "index.html";
}

carregar();
</script>

</body>
</html>
